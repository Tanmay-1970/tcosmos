name: My First Workflow
  #if you dont give the name then it will show  the path of the file
on: push
 #here you can use multipple events also
jobs:
  first_job:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Welcome
      run: echo "My First Github Action Job"

    - name: Show current directory
      run: pwd
      
    - name: List files
      run: ls -althr

    - name: Read file (if exists)
      run: |
        if [ -f README.md]; then
          cat README.md
         else 
           echo "README.md not found"
         fi
    - name: Read file
      run: cat yellow.txt
