on:
  push:
 
jobs:
  build_job_1:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: install Cowsay Program
      run: sudo apt-get install cowsay -y

    - name: Execute Cowsay CMD
      run: cowsay -f dragon "Run for cover, I am a DRAGON....RAWR" >> dragon.txt

    - name: Upload Dragon text file
      uses: actions/upload-artifact@v6 
      with:
        name: dragon-text-file           #this name is use to downlod the file on next job
        path: dragon.txt 

  test_job_2:
    needs: build_job_1                  #once the above job complete this job will start, that means this depend on above job, so all jobs will run one by obe.
    runs-on: ubuntu-latest
    steps:
    - name: Download Dragon text file
      uses: actions/download-artifact@v6
      with:
        name: dragon-text-file      #this name is use to downlod the file on next job
        path: dragon.txt


    - name: Test File Exists
      run: grep -i "dragon" dragon.txt

  deploy_job_3:
    needs: test_job_2              #same for this also it depend on test_job_2
                                   #you can also use array like [test_job_2, build_job_1]  
    runs-on: ubuntu-latest
    steps:
    - name: Download Dragon text file
      uses: actions/download-artifact@v6
      with:
        name: dragon-text-file   

    - name: Read File 
      run: cat dragon.txt
    
    - name: Deploy
      run: echo Deploying.......
